<div class="text-container">
  <div class="text-card">
    <div class="sentence">
      <span class="muted">{{ prefix }}</span>
      
      <span class="highlight hour">{{ hourText }}</span>
      
      <span class="muted">{{ minPrefix }}</span>
      
      <span class="highlight minute">{{ minText }}</span>
      
      <span class="muted">con</span>
      
      <span class="highlight second">{{ secText }}</span>
      
      <span class="muted">segundos.</span>
    </div>
  </div>
</div>
