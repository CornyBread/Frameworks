<div class="clock-container">
  <div class="clock-face">
    <div class="center-dot"></div>
    <div class="hand hour" [style.transform]="'rotate(' + hoursDeg + 'deg)'"></div>
    <div class="hand minute" [style.transform]="'rotate(' + minsDeg + 'deg)'"></div>
    <div class="hand second" [style.transform]="'rotate(' + secsDeg + 'deg)'"></div>
  </div>
</div>
